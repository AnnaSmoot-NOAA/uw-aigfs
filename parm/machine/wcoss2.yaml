platform:
  account: AIGFS-DEV
  scheduler: pbs
  pretrained_model_path: /lfs/h1/ops/prod/packages/aigfs.v1.0.4/venv

user:
  experiment_dir: /lfs/h2/emc/stmp/YOUR_USER/aigfs/run
  aigfs_app: /lfs/h2/emc/noscrub/YOUR_USER/aigfs
  gfs_data: /lfs/h1/ops/prod/com/gfs/v16.3
  platform: wcoss2

prep:
  aigfs_ics:
    execution:
      envcmds:
        - module load intel/19.1.3.304
        - module load wgrib2/2.0.8
        - module load libjpeg-turbo/2.1.0
        - source /lfs/h1/ops/prod/packages/aigfs.v1.0.4/venv/bin/activate

forecast:
  graphcast_model:
    execution:
      envcmds:
        - module load intel/19.1.3.304
        - module load wgrib2/2.0.8
        - module load libjpeg-turbo/2.1.0
        - source /lfs/h1/ops/prod/packages/aigfs.v1.0.4/venv/bin/activate
